<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="description" content="Entrar — Roteiro Buenos Aires, março 2026">
<link rel="canonical" href="https://argentina.mariovalney.com/login">
<meta property="og:type" content="website">
<meta property="og:url" content="https://argentina.mariovalney.com/login">
<meta property="og:site_name" content="Roteiro Buenos Aires">
<meta property="og:locale" content="pt_BR">
<meta property="og:title" content="Entrar — Roteiro Buenos Aires">
<meta property="og:description" content="Entrar com Google ou Microsoft — Roteiro Buenos Aires, março 2026">
<meta property="og:image" content="https://argentina.mariovalney.com/ogimage.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:alt" content="Roteiro de viagem Buenos Aires — março 2026">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://argentina.mariovalney.com/ogimage.png">
<title>Buenos Aires 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Dancing+Script:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #3a8fd4;
  --blue-light: #74acdf;
  --black: #0d0d0d;
  --white: #ffffff;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}

.screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: calc(48px + var(--safe-top)) 32px calc(48px + var(--safe-bottom));
  text-align: center;
}

.eyebrow {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--blue-light);
  font-weight: 500;
  margin-bottom: 20px;
  opacity: 0.8;
}

.title {
  font-family: 'Anton', sans-serif;
  font-size: clamp(64px, 18vw, 108px);
  text-transform: uppercase;
  color: var(--white);
  letter-spacing: 2px;
  line-height: 0.95;
}

.title-script {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(28px, 8vw, 44px);
  color: var(--blue);
  font-weight: 700;
  margin-top: 10px;
  line-height: 1;
}

.divider {
  width: 40px;
  height: 3px;
  background: var(--blue);
  margin: 36px auto;
  opacity: 0.7;
}

.btn-google {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--white);
  color: #1f1f1f;
  text-decoration: none;
  border-radius: 6px;
  padding: 13px 22px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.2px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
}

.btn-google:active {
  transform: scale(0.97);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}

.auth-buttons {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.btn-microsoft {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: #2f2f2f;
  color: #fff;
  text-decoration: none;
  border-radius: 6px;
  padding: 13px 22px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.2px;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
}

.btn-microsoft:active {
  transform: scale(0.97);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}

.error {
  margin-top: 18px;
  font-size: 11px;
  color: #ff7070;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: none;
}

.meta {
  margin-top: 52px;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--white);
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="screen">
  <p class="eyebrow">Roteiro de viagem &middot; Março 2026</p>
  <div class="title">Buenos<br>Aires</div>
  <div class="title-script">é nois</div>
  <div class="divider"></div>

  <div class="auth-buttons" id="auth-buttons">
    <a class="btn-google" id="btn-google" href="/auth/google" hidden>
      <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Entrar com Google
    </a>
    <a class="btn-microsoft" id="btn-microsoft" href="/auth/microsoft" hidden>
      <svg width="20" height="20" viewBox="0 0 21 21" aria-hidden="true">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Entrar com Microsoft
    </a>
  </div>

  <p class="error" id="error-msg">E-mail não autorizado.</p>
  <p class="meta">27 – 30 Mar &middot; GRU → AEP</p>
</div>

<script>
if (new URLSearchParams(location.search).has('erro')) {
  document.getElementById('error-msg').style.display = 'block';
}

fetch('/api/auth/providers')
  .then((r) => r.json())
  .then(({ google, microsoft }) => {
    const g = document.getElementById('btn-google');
    const m = document.getElementById('btn-microsoft');
    if (google) g.hidden = false;
    if (microsoft) m.hidden = false;
  })
  .catch(() => {});
</script>
</body>
</html>
